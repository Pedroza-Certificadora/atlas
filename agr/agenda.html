<!doctype html>
<html lang="pt-BR" class="auth-check-pending" data-auth-protected data-auth-permission="AGENDA_READ">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
  <title>Agenda | Atlas</title>
  <link rel="icon" href="../images/logo/favicon-32.png"><link rel="stylesheet" href="../css/style.css?v=5.0.7"><link rel="stylesheet" href="../css/agr.css?v=5.0.7"><link rel="stylesheet" href="../css/auth.css?v=5.0.7"><link rel="stylesheet" href="../css/agenda.css?v=5.0.7">
  <script src="../js/auth/config.js?v=5.0.7"></script><script src="../js/api/atlas-api.js?v=5.0.7"></script><script src="../js/auth/storage.js?v=5.0.7"></script><script src="../js/auth/crypto.js?v=5.0.7"></script><script src="../js/auth/users.mock.js?v=5.0.7"></script><script src="../js/auth/audit.js?v=5.0.7"></script><script src="../js/auth/permissions.js?v=5.0.7"></script><script src="../js/auth/session.js?v=5.0.7"></script><script src="../js/auth/guards.js?v=5.0.7"></script>
</head>
<body class="agr-page agenda-page">
  <header class="site-header"><div class="container header-inner"><a class="brand" href="../"><img src="../images/logo/pedroza-certificadora-header.svg" alt="Pedroza Certificadora"></a><nav class="main-nav"><a href="./">Dashboard</a><a href="clientes.html">Clientes</a><a class="active" href="agenda.html">Agenda</a><a href="comunicacao.html">Comunicação</a></nav><div class="header-actions"><span class="auth-user-chip"><strong data-auth-user-name>Usuário Atlas</strong></span><a class="button button-outline" href="../auth/logout.html">Sair</a></div></div></header>
  <main class="agenda-shell">
    <section class="agenda-heading"><div><span>ATLAS • SPRINT 5.0.7</span><h1>Agenda e Agendamentos</h1><p>Organize atendimentos, responsáveis e solicitações do Portal do Cliente.</p></div><button id="agenda-new" type="button" data-auth-permission="AGENDA_MANAGE">+ Novo agendamento</button></section>
    <section class="agenda-kpis"><article><span>Hoje</span><strong id="agenda-today">0</strong></article><article><span>Aguardando confirmação</span><strong id="agenda-requested">0</strong></article><article><span>Confirmados</span><strong id="agenda-confirmed">0</strong></article><article><span>Concluídos</span><strong id="agenda-completed">0</strong></article></section>
    <section class="agenda-toolbar"><button data-view="day">Dia</button><button class="active" data-view="week">Semana</button><button data-view="month">Mês</button><label>Data de referência<input id="agenda-reference" type="date"></label><button id="agenda-refresh">Atualizar</button></section>
    <section id="agenda-list" class="agenda-list"><p>Carregando agenda...</p></section>
  </main>
  <div id="agenda-modal" class="agenda-modal" hidden><form id="agenda-form"><header><div><span>Atendimento</span><h2 id="agenda-form-title">Novo agendamento</h2></div><button type="button" id="agenda-close">×</button></header><input id="agenda-id" type="hidden"><label>Cliente<select id="agenda-client" required></select></label><label>Título<input id="agenda-title" required value="Atendimento de certificado digital"></label><div class="agenda-form-grid"><label>Tipo<select id="agenda-type"><option value="EMISSAO">Emissão</option><option value="RENOVACAO">Renovação</option><option value="SUPORTE">Suporte/instalação</option><option value="OUTRO">Outro</option></select></label><label>Situação<select id="agenda-status"><option value="SOLICITADO">Solicitado</option><option value="CONFIRMADO">Confirmado</option><option value="CONCLUIDO">Concluído</option><option value="CANCELADO">Cancelado</option><option value="NAO_COMPARECEU">Não compareceu</option></select></label><label>Início<input id="agenda-start" type="datetime-local" required></label><label>Fim<input id="agenda-end" type="datetime-local" required></label></div><label>Responsável<input id="agenda-owner" placeholder="Marcos Pedroza"></label><label>Link/local<input id="agenda-location" placeholder="Videoconferência, escritório ou link"></label><label>Observações<textarea id="agenda-notes" rows="3"></textarea></label><footer><button type="button" id="agenda-cancel">Cancelar</button><button type="submit">Salvar agendamento</button></footer><p id="agenda-feedback" hidden></p></form></div>
  <script src="../js/auth/auth.js?v=5.0.7"></script><script src="../js/agr/agenda.js?v=5.0.7" defer></script><script src="../js/build-info.js?v=5.0.7" defer></script>
</body></html>
