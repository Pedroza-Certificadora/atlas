<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encerrando sessão | Pedroza Certificadora</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#020817">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/logo/favicon-32.png">
  <link rel="stylesheet" href="../css/style.css?v=4.6.1">
  <link rel="stylesheet" href="../css/auth.css?v=4.6.1">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand-panel" aria-labelledby="logout-brand-title">
      <a class="auth-logo" href="../" aria-label="Pedroza Certificadora — início">
        <img src="../images/logo/pedroza-certificadora-header.svg?v=3.9.4" alt="Pedroza Certificadora" width="279" height="154">
      </a>
      <div class="auth-brand-copy">
        <span class="auth-kicker">Atlas Security</span>
        <h1 id="logout-brand-title">Sessão finalizada.<em>Dados protegidos.</em></h1>
        <p>Estamos removendo os dados da sessão deste navegador.</p>
      </div>
      <p class="auth-brand-footer">Pedroza Certificadora — segurança em cada acesso.</p>
    </section>
    <section class="auth-form-panel">
      <div class="auth-card auth-center-card">
        <span class="auth-card-badge">Logout seguro</span>
        <h2>Até logo</h2>
        <p class="auth-card-intro" id="logout-message">Encerrando sua sessão...</p>
        <a class="auth-submit" href="login.html"><span>Voltar ao login</span></a>
      </div>
    </section>
  </main>
  <script src="../js/auth/config.js?v=4.6.1"></script>
  <script src="../js/auth/crypto.js?v=4.6.1"></script>
  <script src="../js/auth/audit.js?v=4.6.1"></script>
  <script src="../js/auth/permissions.js?v=4.6.1"></script>
  <script src="../js/auth/session.js?v=4.6.1"></script>
  <script src="../js/auth/auth.js?v=4.6.1"></script>
  <script src="../js/auth/guards.js?v=4.6.1"></script>
  <script src="../js/auth/logout-page.js?v=4.6.1"></script>
</body>
</html>
